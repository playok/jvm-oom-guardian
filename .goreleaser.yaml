version: 2

project_name: jvm-oom-guardian

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: jvm-oom-guardian
    main: .
    binary: jvm-oom-guardian
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - README_kr.md
      - config.example.json
      - jvm-oom-guardian.service.example

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

release:
  draft: true
  prerelease: auto
